<!doctype html><meta charset="utf-8"><title>shape A vs shape B</title>
<style>
 body{font:14px system-ui,sans-serif;margin:2rem;background:#fff;color:#111}
 .row{display:flex;gap:2rem;flex-wrap:wrap}
 .col{flex:1 1 320px;border:1px solid #ccc;border-radius:8px;padding:1rem}
 h2{margin:0 0 .5rem;font-size:1rem}
 @media(prefers-color-scheme:dark){body{background:#111;color:#eee}.col{border-color:#444}}
</style>
<div class="row">
 <div class="col"><h2>A — discipline in each stage</h2>
  <svg viewBox="0 0 200 90" width="100%" role="img" aria-label="two stages each carrying a copy">
   <rect x="5" y="5" width="80" height="30" fill="none" stroke="currentColor"/>
   <text x="45" y="24" text-anchor="middle" fill="currentColor" font-size="9">idea +copy</text>
   <rect x="115" y="5" width="80" height="30" fill="none" stroke="currentColor"/>
   <text x="155" y="24" text-anchor="middle" fill="currentColor" font-size="9">design +copy</text>
  </svg></div>
 <div class="col"><h2>B — stated once, hooked twice</h2>
  <svg viewBox="0 0 200 90" width="100%" role="img" aria-label="one shared discipline, two hooks">
   <rect x="60" y="55" width="80" height="28" fill="none" stroke="currentColor"/>
   <text x="100" y="73" text-anchor="middle" fill="currentColor" font-size="9">discipline</text>
   <line x1="45" y1="35" x2="90" y2="55" stroke="currentColor"/>
   <line x1="155" y1="35" x2="110" y2="55" stroke="currentColor"/>
   <rect x="5" y="5" width="80" height="30" fill="none" stroke="currentColor"/>
   <text x="45" y="24" text-anchor="middle" fill="currentColor" font-size="9">idea hook</text>
   <rect x="115" y="5" width="80" height="30" fill="none" stroke="currentColor"/>
   <text x="155" y="24" text-anchor="middle" fill="currentColor" font-size="9">design hook</text>
  </svg></div>
</div>
